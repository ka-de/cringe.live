baseURL = 'https://kadelam.github.io/'
languageCode = 'en-us'
title = 'Unbound Epochs'
theme = "theme"
paginate = 10

[outputs]
  home = ['html', 'rss']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[params]
  author = "Balazs Horvath"
  description = "Just doing what the machines told me to.."
  contentTypeName = "posts"
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = true
  
[languages]
  [languages.en.params]
    title = "Unbound Epochs"
    subtitle = "Just doing what the machines told me to.."
    keywords = "nerdy stuff, blog,"
    copyright = "Balazs Horvath"
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "Unbound Epochs"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
