{{ $url := "http://158.180.53.57/motivation" }}

<script>
  fetch("{{ $url }}")
    .then(response => response.json())
    .then(data => {
      const motivationDiv = document.getElementById("motivation");
      motivationDiv.innerHTML = `
        <blockquote>
          <p>${data.quote}</p>
          <footer>&mdash; ${data.author}</footer>
        </blockquote>
      `;
    })
    .catch(error => console.error("Error fetching data:", error));
</script>

<div id="motivation">
  <p>Loading...</p>
</div>
