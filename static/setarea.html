<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Areas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .area-info {
      position: absolute;
      top: -1rem;
      right: -1rem;
      color: white;
      font-size: 14px;
      font-family: monospace;
      padding: 0.2rem;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 0.2rem;
      z-index: 100;
    }

    .canvas {
      position: relative;
      border: 2px solid #000;
    }

    input {
      width: 60px;
    }

    .area {
      position: absolute;
      border: 1px solid #000;
      background-color: rgba(200, 200, 200, 0.5); /* Semi-transparent gray background */
    }

    .floating-bar {
      text-align: center;
      position: absolute;
      background-color: #fff;
      padding: 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      z-index: 10;
      cursor: move;
    }
  </style>
</head>
<body class="bg-gray-100">
<div class="floating-bar" id="floating-bar">
  <div class="grid grid-cols-2 gap-4 mb-2">
    <div class="flex items-center">
      <label for="canvasWidth" class="mr-2">Width:</label>
      <input type="number" id="canvasWidth" value="600" class="border border-gray-300 rounded-md px-2 py-1 mr-2">
    </div>
    <div class="flex items-center">
      <label for="canvasHeight" class="mr-2">Height:</label>
      <input type="number" id="canvasHeight" value="400" class="border border-gray-300 rounded-md px-2 py-1">
    </div>
    <div class="flex items-center">
      <label for="areaWidth" class="mr-2">Width:</label>
      <input type="number" id="areaWidth" value="100" class="border border-gray-300 rounded-md px-2 py-1 mr-2">
    </div>
    <div class="flex items-center">
      <label for="areaHeight" class="mr-2">Height:</label>
      <input type="number" id="areaHeight" value="100" class="border border-gray-300 rounded-md px-2 py-1 mr-2">
    </div>
    <div class="flex items-center">
      <label for="areaX" class="mr-2">X:</label>
      <input type="number" id="areaX" value="0" class="border border-gray-300 rounded-md px-2 py-1 mr-2">
    </div>
    <div class="flex items-center">
      <label for="areaY" class="mr-2">Y:</label>
      <input type="number" id="areaY" value="0" class="border border-gray-300 rounded-md px-2 py-1">
    </div>
    <div class="flex items-center">
      <label for="bgImageFile" class="mr-2">BG Image:</label>
      <input type="file" id="bgImageFile" accept="image/*" class="border border-gray-300 rounded-md px-2 py-1 mr-2" onchange="setBackgroundImage(this.files[0])">
    </div>
    <div class="flex items-center">
      <label for="bgImageOpacity" class="mr-2">BG Opacity:</label>
      <input type="range" id="bgImageOpacity" min="0" max="1" step="0.01" value="1" class="border border-gray-300 rounded-md px-2 py-1 mr-2" oninput="adjustImageOpacity(this.value)">
    </div>
  </div>
  <button onclick="setCanvasSize()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-2">Set Canvas Size</button>
  <button onclick="addArea()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mb-2">Add Area</button>
  <button onclick="removeArea()" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded mb-2">Remove Area</button>
</div>

<div class="canvas mx-auto mt-8" id="canvas">
    <div id="bgImageContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
</div>

<script>
let floatingBar = document.getElementById('floating-bar');
let isDraggingFloatingBar = false;
let floatingBarInitialX;
let floatingBarInitialY;

floatingBar.addEventListener('mousedown', floatingBarDragStart);
floatingBar.addEventListener('mousemove', floatingBarDrag);
floatingBar.addEventListener('mouseup', floatingBarDragEnd);
floatingBar.addEventListener('mouseleave', floatingBarDragEnd);

function floatingBarDragStart(e) {
  isDraggingFloatingBar = true;
  floatingBarInitialX = e.clientX - floatingBar.offsetLeft;
  floatingBarInitialY = e.clientY - floatingBar.offsetTop;
}

function floatingBarDrag(e) {
  if (isDraggingFloatingBar) {
    let newX = e.clientX - floatingBarInitialX;
    let newY = e.clientY - floatingBarInitialY;

    floatingBar.style.left = newX + 'px';
    floatingBar.style.top = newY + 'px';
  }
}

function floatingBarDragEnd() {
  isDraggingFloatingBar = false;
}


let backgroundImageOpacity = 1; // Initialize background image opacity

function setBackgroundImage(file) {
  const canvas = document.getElementById('canvas');
  const bgImageContainer = document.getElementById('bgImageContainer');

  if (file) {
    const reader = new FileReader();
    reader.onload = function() {
      const img = new Image();
      img.src = reader.result;
      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        bgImageContainer.style.backgroundImage = `url(${reader.result})`;
        bgImageContainer.style.backgroundSize = 'cover';
        bgImageContainer.style.backgroundRepeat = 'no-repeat';
        bgImageContainer.style.backgroundPosition = 'center';
        // Reset background image opacity when setting a new background image
        bgImageContainer.style.opacity = 1;
      };
    };
    reader.readAsDataURL(file);
  } else {
    canvas.width = parseInt(document.getElementById('canvasWidth').value, 10);
    canvas.height = parseInt(document.getElementById('canvasHeight').value, 10);
    bgImageContainer.style.backgroundImage = 'none';
    bgImageContainer.style.opacity = 1;
  }
}

function adjustImageOpacity(opacity) {
  const bgImageContainer = document.getElementById('bgImageContainer');
  bgImageContainer.style.opacity = opacity;
}

let areas = [];
let isDragging = false;
let currentX;
let currentY;
let initialX;
let initialY;
let xOffset = 0;
let yOffset = 0;
let isSelecting = false;
let startX;
let startY;

// Set the initial canvas size to 1024 x 1024
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('canvasWidth').value = 1024;
  document.getElementById('canvasHeight').value = 1024;
  setCanvasSize();
});

function elementDrag(e) {
  e = e || window.event;
  e.preventDefault(); // Prevent default behavior for all elements

  let clickedElement = e.target;
  if (clickedElement.tagName.toLowerCase() !== 'input') {
    // Only perform dragging logic if the clicked element is not an input field
    if (isDragging) {
      currentX = e.clientX - initialX;
      currentY = e.clientY - initialY;
      xOffset = currentX;
      yOffset = currentY;
      setTranslate(currentX, currentY, floatingBar);
    }
  }
}

function setTranslate(xPos, yPos, el) {
  el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
}

function setCanvasSize() {
  const canvasWidth = document.getElementById('canvasWidth').value;
  const canvasHeight = document.getElementById('canvasHeight').value;
  const canvas = document.getElementById('canvas');
  canvas.style.width = canvasWidth + 'px';
  canvas.style.height = canvasHeight + 'px';
}

function addArea() {
  const areaWidth = document.getElementById('areaWidth').value;
  const areaHeight = document.getElementById('areaHeight').value;
  const areaX = document.getElementById('areaX').value;
  const areaY = document.getElementById('areaY').value;
  const color = getRandomRGBAColor(); // Use the new function to get rgba color

  const area = document.createElement('div');
  area.className = 'area bg-gray-300 rounded-md';
  area.style.width = areaWidth + 'px';
  area.style.height = areaHeight + 'px';
  area.style.left = areaX + 'px';
  area.style.top = areaY + 'px';
  area.style.backgroundColor = color; // Set background color

  // Display width, height, and xy coordinates inside the area
  area.innerHTML = `<span class="area-info">${areaWidth}x${areaHeight}<br>${areaX},${areaY}</span>`;

  const canvas = document.getElementById('canvas');
  canvas.appendChild(area);
  areas.push(area);
}


function removeArea() {
  const canvas = document.getElementById('canvas');
  if (areas.length > 0) {
    canvas.removeChild(areas.pop());
  }
}

function getRandomRGBAColor() {
  const r = Math.floor(Math.random() * 256);
  const g = Math.floor(Math.random() * 256);
  const b = Math.floor(Math.random() * 256);
  // Set alpha value to 0.5
  const a = 0.5;
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function handleMouseSelection(event) {
  if (!isDragging) {
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    startX = event.clientX - rect.left + scrollLeft;
    startY = event.clientY - rect.top + scrollTop;
    isSelecting = true;
  }
}

function handleMouseMovement(event) {
  if (isSelecting) {
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const mouseX = event.clientX - rect.left + scrollLeft;
    const mouseY = event.clientY - rect.top + scrollTop;

    const offsetX = mouseX - startX;
    const offsetY = mouseY - startY;

    // Calculate position and dimensions relative to canvas edges
    let newX = Math.min(startX, mouseX);
    let newY = Math.min(startY, mouseY);
    let newWidth = Math.abs(offsetX);
    let newHeight = Math.abs(offsetY);

    // Ensure that the selection area stays within the canvas boundaries
    if (newX < 0) {
      newWidth += newX;
      newX = 0;
    }
    if (newY < 0) {
      newHeight += newY;
      newY = 0;
    }
    if (newX + newWidth > canvas.offsetWidth) {
      newWidth = canvas.offsetWidth - newX;
    }
    if (newY + newHeight > canvas.offsetHeight) {
      newHeight = canvas.offsetHeight - newY;
    }

    // Create or update the temporary selection area
    let selectionArea = document.getElementById('selectionArea');
    if (!selectionArea) {
      selectionArea = document.createElement('div');
      selectionArea.id = 'selectionArea';
      selectionArea.className = 'area bg-blue-300 bg-opacity-50 rounded-md';
      canvas.appendChild(selectionArea);
    }
    selectionArea.style.left = newX + 'px';
    selectionArea.style.top = newY + 'px';
    selectionArea.style.width = newWidth + 'px';
    selectionArea.style.height = newHeight + 'px';
  }
}

function handleSelectionEnd(event) {
  if (isSelecting) {
    isSelecting = false;

    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const mouseX = event.clientX - rect.left + scrollLeft;
    const mouseY = event.clientY - rect.top + scrollTop;

    const width = mouseX - startX;
    const height = mouseY - startY;

    const area = document.createElement('div');
    area.className = 'area bg-gray-300 rounded-md';
    area.style.left = Math.min(startX, mouseX) + 'px';
    area.style.top = Math.min(startY, mouseY) + 'px';
    area.style.width = Math.abs(width) + 'px';
    area.style.height = Math.abs(height) + 'px';
    area.style.backgroundColor = getRandomRGBAColor();

    // Add area info
    area.innerHTML = `<span class="area-info">${Math.abs(width)}x${Math.abs(height)}<br>${Math.min(startX, mouseX)},${Math.min(startY, mouseY)}</span>`;

    canvas.appendChild(area);
    areas.push(area);

    // Remove the temporary selection area
    const selectionArea = document.getElementById('selectionArea');
    if (selectionArea) {
      canvas.removeChild(selectionArea);
    }
  }
}

// Add event listeners for mouse down, mousemove, and mouseup
document.getElementById('canvas').addEventListener('mousedown', handleMouseSelection);
document.getElementById('canvas').addEventListener('mousemove', handleMouseMovement);
document.getElementById('canvas').addEventListener('mouseup', handleSelectionEnd);

</script>

</body>
</html>
